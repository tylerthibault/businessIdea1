{% extends 'bases/private.html' %}
{% block title %}{{ 'Edit' if client else 'New' }} Client — QuoteKit{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{{ url_for('clients.index') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="fw-bold mb-0">{{ 'Edit' if client else 'New' }} Client</h4>
</div>
<div class="bg-white rounded-3 border p-4" style="max-width:560px;">
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Name *</label>
      <input type="text" name="name" class="form-control" required
             value="{{ client.name if client else '' }}" autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Company</label>
      <input type="text" name="company" class="form-control"
             value="{{ client.company if client else '' }}">
    </div>
    <div class="row g-3 mb-3">
      <div class="col">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" name="email" class="form-control"
               value="{{ client.email if client else '' }}">
      </div>
      <div class="col">
        <label class="form-label fw-semibold">Phone</label>
        <input type="tel" name="phone" class="form-control"
               value="{{ client.phone if client else '' }}">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Address</label>
      <textarea name="address" class="form-control" rows="2">{{ client.address if client else '' }}</textarea>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Notes</label>
      <textarea name="notes" class="form-control" rows="2">{{ client.notes if client else '' }}</textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn fw-semibold"
              style="background:var(--navy);color:#fff;">
        {{ 'Save Changes' if client else 'Add Client' }}
      </button>
      <a href="{{ url_for('clients.index') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
