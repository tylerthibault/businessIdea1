{% extends 'bases/public.html' %}
{% block title %}Sign Up — QuoteKit{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:var(--cream);">
  <div class="card shadow-sm border-0 rounded-3" style="width:100%;max-width:460px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <a href="/" class="text-decoration-none fs-4 fw-bold" style="color:var(--navy);">
          Quote<span style="color:var(--gold);">Kit</span>
        </a>
        <p class="text-muted mt-1 mb-0">Start sending quotes in minutes</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Your Name</label>
          <input type="text" name="name" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Business Name <span class="text-muted fw-normal">(optional)</span></label>
          <input type="text" name="business_name" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" required minlength="6">
        </div>
        <button type="submit" class="btn w-100 py-2 fw-semibold"
                style="background:var(--gold);color:#fff;border:none;">Create Free Account</button>
      </form>
      <div class="text-center mt-3 text-muted" style="font-size:0.9rem;">
        Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--navy);">Log in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
