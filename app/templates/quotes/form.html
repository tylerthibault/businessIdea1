{% extends 'bases/private.html' %}
{% block title %}New Quote — QuoteKit{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{{ url_for('quotes.index') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="fw-bold mb-0">New Quote</h4>
</div>
<div class="bg-white rounded-3 border p-4" style="max-width:620px;">
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Quote Title *</label>
      <input type="text" name="title" class="form-control" required autofocus
             placeholder="e.g. Bathroom Renovation — Johnson Residence">
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Client <span class="text-muted fw-normal">(optional)</span></label>
      <select name="client_id" class="form-select">
        <option value="">— No client —</option>
        {% for c in clients %}
        <option value="{{ c.id }}">{{ c.name }}{% if c.company %} ({{ c.company }}){% endif %}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Description <span class="text-muted fw-normal">(optional)</span></label>
      <textarea name="description" class="form-control" rows="2"
                placeholder="Brief summary of the work..."></textarea>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Valid Until <span class="text-muted fw-normal">(optional)</span></label>
      <input type="date" name="valid_until" class="form-control" style="max-width:200px;">
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn fw-semibold"
              style="background:var(--gold);color:#fff;border:none;">
        Create Quote &amp; Add Items <i class="bi bi-arrow-right ms-1"></i>
      </button>
      <a href="{{ url_for('quotes.index') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
